<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Metadata defining document characteristics -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title and description for SEO and browser tab display -->
    <title>malak's website | Favorites</title>
    <meta name="description" content="A space for media, books, videos, or random gems that inspired me.">

    <!-- Link to the central stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Theme Toggle Scripts -->
    <script src="theme.js" defer></script>
    <script>
        // Prevent theme flash on page load
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>
</head>

<body>

    <!-- 1. NAVIGATION BAR -->
    <!-- The exact same <nav> component from index.html to ensure consistent page navigation. -->
    <nav>
        <ul>
            <!-- Relative links to the 4 pages in the website -->
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="journal.html">Journal</a></li>
            <!-- Note: Linked to favorites.html to match the file created in your workspace -->
            <li><a href="favorites.html" class="active">Favorites</a></li>
        </ul>
        <div class="theme-switcher">
            <span id="theme-text" class="theme-callout">prefer light?</span>
            <img class="theme-arrow" src="assets/arrow-scribble.svg" alt="" aria-hidden="true">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 2v20a10 10 0 0 0 0-20z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <!-- 2. MAIN HEADER -->
    <!-- The <header> element contains page-specific introductory context and title. -->
    <header>
        <h1>things i loved</h1>
        <p>
            just a bunch of random stuff i loved.
        </p>
    </header>

    <!-- 3. MAIN SECTION -->
    <!-- The <main> tag holds the main content unique to this page. -->
    <main>

        <!-- Empty unordered list for future favorites -->
        <ul>
            <!-- Log future favorites here -->
        </ul>

    </main>

    <!-- 4. NO FOOTER -->
    <!-- As requested, this page does not contain a <footer> element. -->

</body>

</html>
